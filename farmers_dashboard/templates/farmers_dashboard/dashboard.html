<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard | CowCalving</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-6xl items-center justify-center px-4 py-10">
        <section class="w-full max-w-3xl rounded-3xl border border-slate-200 bg-white p-8 shadow-sm sm:p-10">
            <div class="space-y-4 text-center sm:text-left">
                <p class="text-sm font-semibold uppercase tracking-[0.28em] text-emerald-700">CowCalving</p>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">Farmer Dashboard</h1>
                <p class="text-base leading-7 text-slate-600">
                    This is the first farmer dashboard placeholder. We will connect your final Tailwind design and
                    farm workflow modules here next.
                </p>
                <div class="flex flex-col gap-3 pt-3 sm:flex-row">
                    <a href="/dashboard/profile/" class="inline-flex items-center justify-center rounded-2xl border border-emerald-200 bg-emerald-50 px-5 py-3 font-semibold text-emerald-900 transition hover:bg-emerald-100">
                        Manage Profile
                    </a>
                    <a href="/app/" class="inline-flex items-center justify-center rounded-2xl bg-emerald-700 px-5 py-3 font-semibold text-white transition hover:bg-emerald-800">
                        Open AI Workspace
                    </a>
                    <form method="post" action="/accounts/logout/">
                        {% csrf_token %}
                        <button type="submit" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 px-5 py-3 font-semibold text-slate-700 transition hover:bg-slate-50">
                            Sign out
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
